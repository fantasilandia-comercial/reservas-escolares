<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Escolar - Fantasilandia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .booking-card { max-width: 850px; margin: 40px auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; border-top: 8px solid #ed1c24; }
        .logo-area { text-align: center; margin-bottom: 25px; }
        .form-label { font-weight: 600; color: #333; }
        .btn-primary { background-color: #ed1c24; border: none; font-weight: bold; padding: 12px; }
        .btn-primary:hover { background-color: #c41219; }
        .section-title { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; color: #ed1c24; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-card">
        <div class="logo-area">
            <h2>🎡 Reservas para Colegios</h2>
            <p class="text-muted">Busque por ID o seleccione su ubicación</p>
        </div>

        <form id="bookingForm">
            <!-- Part 1: Identification -->
            <div class="section-title">1. Identificación del Colegio</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">RBD</label>
                    <input type="text" id="rbdInput" class="form-control" placeholder="Ej: 1">
                </div>
                <div class="col-md-6">
                    <label class="form-label">RUT Sostenedor</label>
                    <input type="text" id="rutInput" class="form-control" placeholder="Ej: 69010100">
                </div>
            </div>

            <!-- Part 2: Location and Selection -->
            <div class="row g-3 mt-1">
                <div class="col-md-4">
                    <label class="form-label">Región</label>
                    <select id="regionSelect" class="form-select">
                        <option value="">Seleccione Región</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Comuna</label>
                    <select id="comunaSelect" class="form-select" disabled>
                        <option value="">Seleccione Comuna</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nombre del Colegio</label>
                    <select id="schoolSelect" class="form-select" disabled>
                        <option value="">Seleccione Colegio</option>
                    </select>
                </div>
            </div>

            <!-- Part 3: Contact -->
            <div class="section-title mt-4">2. Información de Contacto</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre Encargado</label>
                    <input type="text" id="contactName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="contactEmail" class="form-control" required>
                </div>
            </div>

            <!-- Part 4: Visit Details -->
            <div class="section-title mt-4">3. Detalles de la Visita</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha disponible</label>
                    <select id="visitDate" class="form-select" required>
                        <option value="">Cargando fechas...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Alumnos (mín. 10)</label>
                    <input type="number" id="kidsCount" class="form-control" min="10" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Producto</label>
                    <select id="productType" class="form-select">
                        <option value="Entrada">Solo Entrada</option>
                        <option value="Entrada + Almuerzo">Entrada + Almuerzo</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4 shadow-sm">Enviar Solicitud</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
