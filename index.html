<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Escolar - Fantasilandia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #004795 0%, #002d5f 100%); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            min-height: 100vh;
            padding-bottom: 50px;
        }
        .booking-card { 
            max-width: 850px; margin: 40px auto; padding: 30px; 
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            background: white; 
            border-top: 10px solid #fbe100; /* Yellow top accent */
        }
        .logo-area h2 { color: #ed1c24; font-weight: 800; text-transform: uppercase; }
        
        .section-title { 
            border-left: 5px solid #004795; 
            padding-left: 10px; margin-bottom: 20px; 
            color: #004795; font-weight: bold; font-size: 1.2rem;
            background: rgba(0, 71, 149, 0.05);
        }
        
        .btn-primary { 
            background: linear-gradient(to right, #ed1c24, #b31217); 
            border: none; font-weight: bold; padding: 15px; 
            color: white; transition: transform 0.2s;
        }
        .btn-primary:hover { 
            background: linear-gradient(to right, #b31217, #ed1c24); 
            transform: translateY(-2px);
        }
        
        .form-label { color: #004795; }
        .form-control:focus, .form-select:focus {
            border-color: #fbe100;
            box-shadow: 0 0 0 0.25rem rgba(251, 225, 0, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="booking-card">
        <div class="logo-area">
            <h2>🎡 Reservas para Colegios</h2>
            <p class="text-muted">Busque por RBD, RUT o Ubicación</p>
        </div>

        <form id="bookingForm">
            <!-- Part 1: Identification -->
            <div class="section-title">1. Identificación del Colegio</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">RBD (Sin dígito verificador)</label>
                    <input type="text" id="rbdInput" class="form-control" placeholder="Ej: 1">
                </div>
                <div class="col-md-6">
                    <label class="form-label">RUT Sostenedor (Sin dígito verificador)</label>
                    <input type="text" id="rutInput" class="form-control" placeholder="Ej: 69010100">
                </div>
            </div>

            <!-- Part 2: Location and Selection -->
            <div class="row g-3 mt-1">
                <div class="col-md-4">
                    <label class="form-label">Región</label>
                    <select id="regionSelect" class="form-select">
                        <option value="">Seleccione Región</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Comuna</label>
                    <select id="comunaSelect" class="form-select" disabled>
                        <option value="">Seleccione Comuna</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nombre del Colegio</label>
                    <input type="text" id="schoolSearch" class="form-control mb-1" placeholder="Escriba para buscar..." disabled>
                    <select id="schoolSelect" class="form-select" disabled>
                        <option value="">Seleccione Colegio</option>
                    </select>
                </div>
            </div>

            <!-- Part 3: Contact -->
            <div class="section-title mt-4">2. Información de Contacto</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre Encargado</label>
                    <input type="text" id="contactName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="contactEmail" class="form-control" required>
                </div>
            </div>

            <!-- Part 4: Visit Details -->
            <div class="section-title mt-4">3. Detalles de la Visita</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha disponible</label>
                    <select id="visitDate" class="form-select" required>
                        <option value="">Cargando fechas...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Alumnos (mín. 10)</label>
                    <input type="number" id="kidsCount" class="form-control" min="10" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Producto</label>
                    <select id="productType" class="form-select">
                        <option value="Entrada">Solo Entrada</option>
                        <option value="Entrada + Almuerzo">Entrada + Almuerzo</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4 shadow-sm">Enviar Solicitud</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
